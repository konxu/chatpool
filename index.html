<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatjam — Chat together, jam together</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="top-card" id="roomCard">
      <div class="room-header">
        <div class="title-block">
          <p class="eyebrow"><a id="brandHome" class="brand-home" href="/" aria-label="Back to Chatjam home">Chatjam</a></p>
          <h1 class="headline" id="headline">
            <span id="headlineLead"></span><span id="inviteTitle" class="editable-title" contenteditable="true" spellcheck="false" aria-label="Jam name" title="Click to edit jam name">chatjam</span><span id="headlineTail"></span>
          </h1>
          <p id="inviteCopy" class="tagline">Chat together, jam together</p>
          <ol id="homeSteps" class="home-steps" aria-label="How Chatjam works">
            <li><span>1</span>Pick a name</li>
            <li><span>2</span>Invite a friend</li>
            <li><span>3</span>Type together</li>
          </ol>
          <p class="room-kicker" id="roomKicker"></p>
        </div>
        <div class="header-actions">
          <button id="copyInviteBtn" class="secondary">Invite a friend</button>
          <button id="recordRoomBtn" class="record-btn" disabled>● Rec</button>
          <a id="downloadClipLink" class="download-link" href="#" download="chatjam-room.webm" hidden>Download clip</a>
          <span id="recordStatus" class="record-status"></span>
        </div>
      </div>

      <div class="join-strip">
        <label class="name-field">
          <input id="nameInput" maxlength="18" placeholder="Your name" autocomplete="nickname" aria-label="Your name" />
        </label>
        <input id="roomInput" type="hidden" maxlength="24" value="jam" />
        <select id="roleSelect" class="visually-hidden" aria-hidden="true" tabindex="-1">
          <option value="auto">random available layer</option>
        </select>
        <button id="joinBtn" class="primary">Start jam</button>
        <button id="createRoomBtn" class="secondary" hidden>New jam</button>
      </div>

      <div class="live-strip">
        <div id="participants" class="participants" aria-label="People in room"></div>
        <input id="inviteLink" class="visually-hidden" readonly value="" aria-label="Invite link" />
      </div>

      <div class="hidden-controls" aria-hidden="true">
        <span id="audioStatus">audio asleep</span>
        <span id="modeStatus">not joined</span>
        <button id="startAudioBtn" type="button">Start audio</button>
        <label>Tempo <strong id="tempoLabel">96</strong> BPM <span id="tempoHint">host controls this</span><input id="tempo" type="range" min="60" max="150" value="96" disabled /></label>
        <button id="clearMineBtn" disabled>Clear mine</button>
        <button id="resetRoomBtn" disabled>Reset room</button>
      </div>
    </section>

    <section class="main-room">
      <section class="panel chat-panel">
        <div id="chatLog" class="chat-log" aria-live="polite"></div>
        <div class="composer-wrap">
          <div class="composer-line">
            <div class="input-stack">
              <div id="recordingMeter" class="capture-meter" aria-hidden="true"><span></span></div>
              <input id="composer" class="composer" placeholder="Join, then type here…" disabled autocomplete="off" inputmode="text" />
            </div>
            <button id="commitBtn" class="primary" disabled>Send</button>
          </div>
          <p class="microcopy" id="composerHelp"></p>
        </div>
      </section>

      <aside class="panel layer-panel" aria-hidden="true">
        <div class="panel-head">
          <h2>Layers</h2>
          <span id="stepReadout" class="hint">live</span>
        </div>
        <div id="capacityBar" class="capacity-bar"></div>
        <div id="tracks" class="tracks"></div>
        <div id="timeline" class="timeline" aria-hidden="true"></div>
      </aside>
    </section>
  </main>

  <template id="messageTemplate">
    <article class="message-card">
      <div class="message-meta"></div>
      <p></p>
    </article>
  </template>

  <template id="trackTemplate">
    <article class="track-card">
      <div class="track-top">
        <div>
          <strong class="track-name"></strong>
          <span class="track-role"></span>
        </div>
        <div class="track-controls">
          <button class="mute-btn">mute</button>
          <label class="volume-control">
            <span>vol <b class="volume-value">78%</b></span>
            <input class="volume-slider" type="range" min="0" max="1.2" step="0.01" value="0.78" />
          </label>
        </div>
      </div>
      <p class="track-caption"></p>
      <div class="step-grid"></div>
    </article>
  </template>

  <script src="/app.js"></script>
</body>
</html>
